spring:
  datasource:
    url: jdbc:mysql://mysql:3306/banking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: MySql@123

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
#    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: redis
      port: 6379

logging:
  level:
    com.nazir.banking: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN