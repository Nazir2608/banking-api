spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:tc:postgresql:15-alpine:///banking_db_test}
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    show-sql: true

  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}

  mail:
    host: localhost
    port: 25

logging:
  level:
    com.banking: DEBUG
