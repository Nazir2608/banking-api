name: Banking API — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/banking-api
  JAVA_VERSION: '21'

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — VALIDATE
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Validate Maven project
        run: mvn validate --no-transfer-progress

      - name: Compile source code
        run: mvn compile --no-transfer-progress

      - name: Run unit tests
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — QODANA CODE QUALITY
  # Deploy is BLOCKED until this passes.
  # ─────────────────────────────────────────────────────────────────────────────
  qodana:
    name: Qodana Code Quality
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: false
          push-fixes: none

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — BUILD
  # Runs after validate + qodana both pass.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [ validate, qodana ]
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Package JAR
        run: mvn package -DskipTests --no-transfer-progress

      - name: Verify SQL migrations are packaged in JAR
        run: |
          count=$(jar tf target/*.jar | grep -c "db/migration/.*\.sql" || true)
          echo "Migration files found in JAR: $count"
          if [ "$count" -lt 6 ]; then
            echo "ERROR: Expected at least 6 migration files, found $count"
            jar tf target/*.jar | grep -i migration || true
            exit 1
          fi
          echo "All $count migrations present ✓"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — DEPLOY (main branch only)
  # Only runs when validate + qodana + build all succeed.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ validate, qodana, build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://${{ secrets.DEPLOY_HOST }}:8080/api/swagger-ui.html

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            APP_DIR="${{ secrets.DEPLOY_APP_DIR || '/opt/banking-api' }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            echo "Deploying $IMAGE"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker pull "$IMAGE"

            if [ ! -f docker-compose.yml ]; then
              echo "ERROR: docker-compose.yml not found in $APP_DIR"
              exit 1
            fi

            docker compose pull app
            docker compose up -d --no-deps --remove-orphans app

            sleep 10
            if ! docker compose ps app | grep -q "Up"; then
              echo "ERROR: Container failed to start"
              docker compose logs --tail=50 app
              exit 1
            fi

            echo "Deployment complete"
            docker compose ps

      - name: Health check
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.DEPLOY_HOST }}:8080/api/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Health check failed after 2 minutes"
          exit 1